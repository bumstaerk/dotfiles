[global/wm]
include-file = $HOME/.config/polybar/mocha.ini


[bar/example]
width = 100%
height = 24pt
radius = 0

; dpi = 96

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = " "
separator-foreground = ${colors.mauve}

font-0 = "FiraMono Nerd Font Mono;2"
font-1 = "FiraCode Nerd Font Mono:pixelsize=16;2"

modules-left = xworkspaces
modules-right = pulseaudio xkeyboard memory cpu wlan battery
modules-center = date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
fixed-center = true
; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %index%
label-active-background = ${colors.crust}
label-active-underline= ${colors.mauve}
label-active-padding = 1

label-occupied = %index%
label-occupied-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %index%
label-empty-foreground = ${colors.surface1}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "%{T2}%{T-} "
format-volume-prefix-foreground = ${colors.mauve}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = 󰖁
label-muted-foreground = ${colors.red}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format = <label-layout> <label-indicator>

label-layout = %{T2}󰥻 %{T-}%{F#cdd6f4}%number%
label-layout-foreground = ${colors.mauve}
label-layout-font = 0
label-indicator-on = %name%
layout-icon-default = none
layout-icon-0 = dk
layout-icon-1 = us

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.base}
label-indicator-background = ${colors.crust}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "%{T2}󰍛 %{T-}"
format-prefix-foreground = ${colors.mauve}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "%{T2}󰘚 %{T-}"
format-prefix-foreground = ${colors.mauve}
label = %percentage:2%%

[module/battery]
type          = internal/battery
full-at       = 98
battery       = BAT0
adapter       = AC0
poll-interval = 5

format-charging = %{T2}󱐋 %{T-}<label-charging>
format-discharging = %{T2}%{F#CBA6F7}%{T-}%{F#cdd6f4} <label-discharging>
format-full = %{T2}%{F#CBA6F7}%{T-} <label-full>


[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#CBA6F7}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{T2}%{F#CBA6F7}%{T-}%{F#cdd6f4} %essid% 

[module/date]
type = internal/date
interval = 1
format = <label>
date = %H:%M %d-%m-%Y
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.text}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
